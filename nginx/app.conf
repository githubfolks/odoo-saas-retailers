# RetailERP — Nginx site config
# Place this in /etc/nginx/sites-available/retailerp and symlink to sites-enabled/
# Then: certbot --nginx -d yourdomain.com

server {
    listen 80;
    server_name yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 20M;

    # Uploaded product images — served directly, no FastAPI hop
    location /static/uploads/ {
        alias /var/www/retailerp/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Everything else goes to FastAPI
    location / {
        proxy_pass         http://127.0.0.1:9001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
